<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube Playlist Manager</title>

     <link rel="icon" href="https://zeus-rr.github.io/nineplay/favicon.png">
  <link rel="apple-touch-icon" href="https://zeus-rr.github.io/nineplay/favicon.png">
  <link rel="shortcut icon" href="https://zeus-rr.github.io/nineplay/favicon.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>
<body>

    <div id="admin-view">
        <header class="admin-panel">
            <div class="logo">🎵 MyTube Playlists</div>
            <button class="btn-main" onclick="criarNovaPlaylist()">+ Novo Quadro</button>
        </header>
        <main id="dashboard" class="playlist-container"></main>
    </div>

    <div id="playlist-view" class="hidden">
        <header class="admin-panel">
            <button class="btn-main" onclick="voltarParaAdmin()">
                <i class="fas fa-arrow-left"></i> Voltar
            </button>
            <h2 id="current-playlist-title">Nome da Playlist</h2>
            <button class="btn-main" onclick="solicitarLinkYoutube()">
                <i class="fab fa-youtube"></i> Adicionar Vídeo
            </button>
        </header>
        <div id="video-list" class="video-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
